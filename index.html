<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belong Education - Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .background-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float 20s infinite ease-in-out;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            bottom: -50px;
            left: -50px;
            animation-delay: 5s;
        }

        .shape-3 {
            width: 200px;
            height: 200px;
            top: 50%;
            left: 50%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -30px) scale(1.05);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.95);
            }
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 2rem;
            max-width: 600px;
        }

        .logo {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -2px;
        }

        .tagline {
            font-size: 1.25rem;
            font-weight: 300;
            margin-bottom: 3rem;
            opacity: 0.9;
        }

        .coming-soon {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: rgba(255, 255, 255, 0.5);
            margin: 2rem auto;
            border-radius: 2px;
        }

        .description {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 3rem;
            opacity: 0.85;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .email-form {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .email-input {
            padding: 1rem 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            width: 300px;
            outline: none;
            transition: border-color 0.3s;
        }

        .email-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .email-input:focus {
            border-color: rgba(255, 255, 255, 0.8);
        }

        .submit-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 50px;
            background: white;
            color: #667eea;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .social-links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .social-links a {
            color: white;
            opacity: 0.7;
            transition: opacity 0.3s;
            text-decoration: none;
        }

        .social-links a:hover {
            opacity: 1;
        }

        .footer {
            margin-top: 4rem;
            font-size: 0.875rem;
            opacity: 0.6;
        }

        @media (max-width: 600px) {
            .logo {
                font-size: 2rem;
            }

            .coming-soon {
                font-size: 2.5rem;
            }

            .tagline {
                font-size: 1rem;
            }

            .email-input {
                width: 100%;
                max-width: 280px;
            }

            .email-form {
                flex-direction: column;
                align-items: center;
            }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }
    </style>
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <div class="logo">🌐 Belong</div>
        <div class="tagline">Learning that leads to belonging</div>

        <div class="coming-soon pulse">Coming Soon</div>

        <div class="divider"></div>

        <div class="description">
            Estamos construyendo algo especial para transformar vidas a través de la educación y el empleo.
            <br><br>
            Pronto podrás conocer nuestros programas y ser parte de la comunidad Belong.
        </div>

        <form class="email-form" onsubmit="event.preventDefault(); alert('¡Gracias por tu interés! Te contactaremos pronto.');">
            <input type="email" class="email-input" placeholder="Tu correo electrónico" required>
            <button type="submit" class="submit-btn">Notifícame</button>
        </form>

        <div class="social-links">

                </svg>
            </a>
        </div>

        <div class="footer">
            © 2026 Belong Education. Todos los derechos reservados.
        </div>
    </div>
</body>
</html>
